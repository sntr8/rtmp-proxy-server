<html>
    <head>
        <title>Kanaliiga PUBG OBS Overlay: team players</title>
        <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600&display=swap');
            body {
                overflow: hidden;
            }
            .scene {
                width: 1920px;
                height: 1080px;
            }
            .logo {
                width: 200px;
                text-align: center;
                font-size: 25px;
                font-weight: bold;
                color: #f29209;
            }
            .left {
                width: 420px;
                height: 1080px;
                position: absolute;
                left: 0px;
                top: 0px;

            }
            .right {
                width: 420px;
                position: absolute;
                left: 1500px;
                top: 0px;
            }
            table {
                border-collapse: collapse;
                width: 420px;
            }
            .team {
                border-bottom-style: solid;
                border-top-style: solid;
                border-color: #f29209;
                border-bottom-width: 2px;
            }
            .names {
                padding-left: 0;
                padding-right: 10px;
                font-size: 22px;
                color: #f29209;
                font-family: 'Big Shoulders Display', sans-serif;
                list-style-type: none;
            }
            .leftnames {
                text-align: right;
                margin-block-end: 0px !important;
            }
            .rightnames {
                text-align: left;
                padding-left: 7px;
                margin-block-end: 0px !important;
            }
            .mapborder {
                position: absolute;
                top: 0px;
                left: 420px;
                width: 1071px;
                height: 1071px;
                border-width: 5px;
                border-style: solid;
                border-color: #f29209;
            }
            .name {
                font-family: 'Big Shoulders Display', sans-serif;
                font-size: 24px;
                color: #f29209;
                overflow: hidden;
                white-space: nowrap;
            }
        </style>
    </head>
    <body onload="createPage()">
        <div id="scene" class="scene">
            <script>
                function createPage() {
                    var origJson = null;
                    $.getJSON('https://dev.kanaliiga.fi/obs.json?rndstr='+new Date().getTime(), function(json) {
                        origJson = JSON.stringify(json);
                        var queryString = window.location.search;
                        var urlParams = new URLSearchParams(queryString);
                        var group = urlParams.get('league');
                        var i = 1;
                        var scene = document.getElementById("scene");
                        var leftCol = document.createElement("div");
                        leftCol.className = "left";
                        var rightCol = document.createElement("div");
                        rightCol.className = "right";
                        var tableLeft = document.createElement("table");
                        tableLeft.className = "teams";
                        var tableRight = document.createElement("table");
                        tableRight.className = "teams";
                        $(json.groups).each(function(index, groupJson) {
                            if (!group || groupJson.key == group) {
                                max = groupJson.teams.length;
                                mid = Math.round(max/2);
                                divHeight = 1080/mid;
                                imgHeigth = divHeight*0.7;

                                $(groupJson.teams).each(function(index, teamJson) {
                                    table = null;
                                    if ( i <= mid ) {
                                        table = tableLeft;
                                    } else {
                                        table = tableRight;
                                    }
                                    var team = document.createElement("tr");
                                    team.className = "team";
                                    team.style.height = divHeight;
                                    var logo = document.createElement("td");
                                    logo.className = "logo";
                                    var logoDiv = document.createElement("div");
                                    logoDiv.className = "logobox";
                                    var logoImg = document.createElement("img");
                                    logoImg.src = teamJson.image;
                                    logoImg.height = imgHeigth
                                    logoDiv.appendChild(logoImg);
                                    logo.appendChild(logoDiv);
                                    var teamDiv = document.createElement("div");
                                    teamDiv.className = "name";
                                    teamDiv.appendChild(document.createTextNode(teamJson.name));
                                    logo.appendChild(teamDiv);
                                    var players = document.createElement("td");
                                    players.className = "players";

                                    var ul = document.createElement("ul");
                                    ul.classList.add("names");
                                    if ( i <= mid ) {
                                        ul.classList.add("leftnames");
                                    } else {
                                        ul.classList.add("rightnames");
                                    }
                                    for (var u = 0 ; u < teamJson.players.length; u++) {
                                        var li = document.createElement("li");
                                        li.appendChild(document.createTextNode(teamJson.players[u]));
                                        ul.appendChild(li);
                                    }
                                    players.appendChild(ul);
                                    if ( i <= mid ) {
                                        team.appendChild(logo);
                                        team.appendChild(players);
                                    } else {
                                        team.appendChild(players);
                                        team.appendChild(logo);
                                    }
                                    table.appendChild(team);
                                    i++;
                                });
                                leftCol.appendChild(tableLeft);
                                rightCol.appendChild(tableRight);
                                scene.appendChild(leftCol);
                                scene.appendChild(rightCol);

                                "use strict";
                                const content = document.querySelectorAll(".content");
                                setInterval(()=>
                                    content.forEach( elem => elem.classList.toggle("visible")),
                                    3000
                                );
                            } else {
                                console.log("League '"+group+"' not found");
                            }
                        });

                    }).fail(function(jqXHR, textStatus, errorThrown) {
                        console.log("Failed " + errorThrown);
                    });

                    setInterval(function() {
                        $.getJSON('https://dev.kanaliiga.fi/obs.json?rndstr='+new Date().getTime(), function(json) {
                            current = JSON.stringify(json);
                            if (origJson && current && origJson !== current) {
                                location.reload();
                            }
                        });
                    }, 2000);
                }
            </script>
            <div class="mapborder"/>
        </div>
    </body>
</html>
