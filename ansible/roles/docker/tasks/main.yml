---
# docker/tasks

- name: Check installed docker version
  shell:
    cmd: dpkg -l docker-ce 2>/dev/null | grep docker-ce | awk '{print $3}'
  register: installed_docker_version
  failed_when: false
  changed_when: false

- name: Check installed containerd.io version
  shell:
    cmd: dpkg -l containerd.io 2>/dev/null | grep containerd.io | awk '{print $3}'
  register: installed_containerdio_version
  failed_when: false
  changed_when: false

- name: Install Docker if not present or version mismatch
  block:
    - name: Unhold Docker packages
      dpkg_selections:
        name: "{{ item }}"
        selection: install
      with_items:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      failed_when: false

    - name: Install Docker prerequisites
      apt:
        name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - software-properties-common
        - python3-docker
        state: present
        update_cache: yes

    - name: Create keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key (modern method)
      shell: |
        curl -fsSL https://download.docker.com/linux/{{ ansible_distribution|lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution|lower }} {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name:
        - docker-ce={{ docker_version }}
        - docker-ce-cli={{ docker_version }}
        - containerd.io={{ containerdio_version }}
        state: present

    - name: Hold Docker to prevent automatic upgrades
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      with_items:
        - docker-ce
        - docker-ce-cli
        - containerd.io

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

  when:
    - docker_version != installed_docker_version.stdout or containerdio_version != installed_containerdio_version.stdout

- name: Log into Docker Hub
  community.docker.docker_login:
    username: "{{ docker_username }}"
    password: "{{ docker_password }}"
  when:
    - docker_username is defined
    - docker_password is defined

- name: Log into custom Docker registry
  community.docker.docker_login:
    registry_url: "{{ registry_url }}"
    username: "{{ registry_username }}"
    password: "{{ registry_password }}"
  when:
    - registry_url is defined
    - registry_username is defined
    - registry_password is defined
