---
# provision/tasks

- name: Add system admin user (optional)
  user:
    name: "{{ system_user }}"
    shell: /bin/bash
    groups: sudo
  register: add_system_user
  when: system_user is defined

- name: Generate password for system user
  set_fact:
    system_pwd: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits,punctuation') }}"
  when: add_system_user.changed

- name: Set password for system user
  user:
    name: "{{ system_user }}"
    password: "{{ system_pwd | password_hash('sha512') }}"
  when: add_system_user.changed

- name: Write password to user home directory
  copy:
    content: "{{ system_pwd }}"
    dest: /home/{{ system_user }}/.pwd.txt
    mode: '0600'
    owner: "{{ system_user }}"
  when: add_system_user.changed

- name: Check default editor
  stat:
    path: /etc/alternatives/editor
  register: editor

- name: Install required packages
  apt:
    name:
    - git
    - vim
    - curl
    - jq
    - ca-certificates
    - gnupg
    state: present
    update_cache: yes

- name: Set vim as default editor
  shell: "/usr/sbin/update-alternatives --set editor /usr/bin/vim.tiny || /usr/bin/update-alternatives --set editor /usr/bin/vim.tiny"
  when: editor.stat.lnk_source is defined and editor.stat.lnk_source != '/usr/bin/vim.tiny'

- import_tasks: upgrade.yml
  tags: upgrade

- name: Create required directories
  file:
    path: /opt/{{ item }}
    state: directory
    mode: '0755'
  with_items:
    - mysql/data
    - haproxy
    - letsencrypt
    - rtmp/workdir

- name: Clone RTMP Proxy Server repository
  git:
    repo: "{{ git_repo | default('https://github.com/sntr8/rtmp-proxy-server.git') }}"
    dest: /opt/rtmp-proxy-server
    version: "{{ git_branch | default('main') }}"
    force: yes
  register: git_clone

- name: Set executable permissions on tools
  file:
    path: /opt/rtmp-proxy-server/tools
    mode: '0755'
    recurse: yes

- name: Add tools directory to secure_path
  lineinfile:
    path: /etc/sudoers
    regexp: '^Defaults[\t\s]+secure_path'
    line: Defaults        secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/rtmp-proxy-server/tools"
    validate: '/usr/sbin/visudo -cf %s'

- name: Set environment variables
  lineinfile:
    path: /etc/profile.d/stream.sh
    regexp: '^export {{ item.key }}='
    line: "export {{ item.key }}={{ item.value }}"
    create: yes
    mode: '0644'
  with_dict: "{{ env_vars }}"

- name: Set registry configuration
  lineinfile:
    path: /etc/profile.d/stream.sh
    regexp: '^export {{ item.key }}='
    line: "export {{ item.key }}={{ item.value }}"
    create: yes
    mode: '0644'
  with_dict: "{{ registry_config }}"
  when: item.value != ''

- name: Set image versions
  lineinfile:
    path: /etc/profile.d/stream.sh
    regexp: '^export {{ item.key }}='
    line: "export {{ item.key }}={{ item.value }}"
    create: yes
    mode: '0644'
  with_dict: "{{ image_versions }}"

- name: Source stream.sh in all bash shells
  lineinfile:
    path: /etc/bash.bashrc
    line: "# Source RTMP Proxy environment variables"
    insertafter: EOF
    create: yes
    mode: '0644'

- name: Source stream.sh in bash.bashrc
  lineinfile:
    path: /etc/bash.bashrc
    line: "[ -f /etc/profile.d/stream.sh ] && . /etc/profile.d/stream.sh"
    insertafter: "# Source RTMP Proxy environment variables"
    create: yes
    mode: '0644'

- name: Preserve environment variables in sudo
  lineinfile:
    path: /etc/sudoers
    line: 'Defaults env_keep += "FQDN MYSQL_* TWITCH_* HAPROXY_VERSION MYSQL_VERSION NGINX_HTTP_VERSION NGINX_RTMP_VERSION PHP_FPM_VERSION DOCKER_USERNAME REGISTRY_URL DISCORD_*"'
    validate: '/usr/sbin/visudo -cf %s'

- name: Add cron_worker.sh to cron
  cron:
    name: "RTMP Proxy cron worker"
    minute: "*/5"
    job: "source /etc/profile.d/stream.sh && /opt/rtmp-proxy-server/tools/cron_worker.sh >> /var/log/cron_worker.log 2>&1"
    user: root

- name: Add logrotate for cron_worker
  copy:
    src: cron_worker.logrotate
    dest: /etc/logrotate.d/cron_worker
    mode: '0644'
